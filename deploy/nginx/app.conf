# Замените pcmoon.by на свой домен.
#
# Это рабочий конфиг для ЭТАПА 1 (HTTP) — сайт уже полностью работает
# на нём, включая получение сертификата через certbot (location
# /.well-known/acme-challenge/ ниже нужен именно для этого).
#
# Когда сертификат будет получен (см. гайд, шаг про certbot), замените
# этот файл на deploy/nginx/app-ssl.conf (переименовав его в app.conf)
# и перезапустите nginx — тогда сайт заработает по https.

server {
    listen 80;
    server_name pcmoon.by www.pcmoon.by;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
