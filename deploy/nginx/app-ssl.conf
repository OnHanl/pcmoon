# Замените pcmoon.by на свой домен.
#
# Этот файл включаем ПОСЛЕ того, как certbot успешно выпустил сертификат
# (см. гайд). Чтобы включить: переименуйте/скопируйте этот файл поверх
# deploy/nginx/app.conf и перезапустите nginx:
#
#   cp deploy/nginx/app-ssl.conf deploy/nginx/app.conf
#   docker compose restart nginx

server {
    listen 80;
    server_name pcmoon.by www.pcmoon.by;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name pcmoon.by www.pcmoon.by;

    ssl_certificate     /etc/letsencrypt/live/pcmoon.by/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pcmoon.by/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
